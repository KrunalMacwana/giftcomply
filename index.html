<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GIFTComply</title>
  <style>
    html, body { height: 100%; margin: 0; }
    #root { height: 100%; }
  

  /* ── LOGIN PAGE – Dark Royal Blue Theme ── */
  /* ── DEEP ROYAL BLUE LOGIN BACKGROUND ── */
  .ls-login {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #0a1040;
    position: relative;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  /* Deep royal blue layered background */
  .ls-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 140% 90% at 50% -5%, rgba(50,90,255,0.32) 0%, transparent 55%),
      radial-gradient(ellipse 70% 60% at 5% 95%, rgba(20,50,200,0.28) 0%, transparent 50%),
      radial-gradient(ellipse 60% 50% at 95% 85%, rgba(70,50,220,0.22) 0%, transparent 50%),
      radial-gradient(ellipse 80% 40% at 50% 100%, rgba(10,30,150,0.4) 0%, transparent 60%);
    pointer-events: none;
    animation: bgBreath 8s ease-in-out infinite alternate;
  }
  .ls-login::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(120,160,255,0.18) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 10%, transparent 100%);
    pointer-events: none;
  }
  @keyframes bgBreath {
    0%   { opacity: 0.75; }
    100% { opacity: 1; }
  }

  /* Floating particles layer */
  .ls-grid-bg {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(circle, rgba(160,200,255,0.15) 1.5px, transparent 1.5px),
      radial-gradient(circle, rgba(100,150,255,0.08) 1px, transparent 1px);
    background-size: 72px 72px, 36px 36px;
    background-position: 0 0, 18px 18px;
  }

  /* ── CARD ── */
  .ls-card {
    width: 100%;
    max-width: 440px;
    box-sizing: border-box;
    background: rgba(8, 16, 72, 0.92);
    border: 1.5px solid rgba(120, 170, 255, 0.35);
    border-radius: 26px;
    padding: 44px 48px 40px;
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    box-shadow:
      0 0 0 1px rgba(200,220,255,0.07) inset,
      0 2px 0 rgba(140,190,255,0.15) inset,
      0 40px 100px rgba(0,5,60,0.85),
      0 0 150px rgba(30,70,255,0.22),
      0 0 50px rgba(50,90,220,0.18);
    position: relative;
    z-index: 1;
  }
  /* Shimmering top edge */
  .ls-card::before {
    content: '';
    position: absolute;
    top: 0; left: 8%; right: 8%;
    height: 2px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(100,160,255,0.4) 15%,
      rgba(160,210,255,0.9) 40%,
      rgba(220,240,255,1) 50%,
      rgba(160,210,255,0.9) 60%,
      rgba(100,160,255,0.4) 85%,
      transparent 100%);
    border-radius: 100px;
    animation: shimmer 4s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }

  /* ── LOGO SECTION ── */
  .ls-logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 22px;
    gap: 0;
    background: rgba(255,255,255,0.97);
    border-radius: 18px;
    padding: 20px 28px 14px 28px;
    box-shadow: 0 4px 32px rgba(80,150,255,0.13), 0 1px 0 rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
  }
  .ls-logo-ring {
    position: relative;
    width: 110px; height: 110px;
    margin-bottom: 20px;
  }
  .ls-logo-ring::before {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 50%;
    background: conic-gradient(
      rgba(80,160,255,1) 0deg,
      rgba(160,220,255,0.9) 70deg,
      rgba(210,235,255,1) 130deg,
      rgba(120,180,255,0.7) 190deg,
      rgba(60,100,240,0.35) 260deg,
      rgba(80,160,255,1) 360deg
    );
    animation: spinRing 5s linear infinite;
    filter: blur(1.5px);
    box-shadow: 0 0 28px rgba(80,150,255,0.6), 0 0 60px rgba(40,100,255,0.25);
  }
  .ls-logo-ring::after {
    content: '';
    position: absolute; inset: -2px;
    border-radius: 50%;
    background: rgba(8,16,72,1);
    z-index: 0;
  }
  @keyframes spinRing {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .ls-logo-circle {
    position: relative; z-index: 1;
    width: 110px; height: 110px;
    background: linear-gradient(145deg, #2a5fe8 0%, #1a46cc 35%, #0f30a0 70%, #0a1f78 100%);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2.5px solid rgba(140,200,255,0.7);
    box-shadow:
      0 0 0 6px rgba(18,50,200,0.35),
      0 16px 50px rgba(10,30,200,0.8),
      inset 0 3px 0 rgba(220,235,255,0.3),
      inset 0 -3px 0 rgba(0,0,100,0.35);
  }
  .ls-logo-text {
    font-size: 34px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -1px;
    text-shadow:
      0 0 18px rgba(200,230,255,1),
      0 0 40px rgba(130,190,255,0.8),
      0 0 70px rgba(80,150,255,0.5),
      0 2px 8px rgba(0,0,80,0.5);
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .ls-logo-title {
    font-size: 28px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 3.5px;
    text-align: center;
    text-shadow:
      0 0 25px rgba(140,200,255,0.9),
      0 0 50px rgba(80,150,255,0.4),
      0 2px 6px rgba(0,0,80,0.6);
    line-height: 1;
  }
  .ls-logo-title span {
    color: #6dd4ff;
    text-shadow:
      0 0 18px rgba(100,220,255,1),
      0 0 40px rgba(50,180,255,0.6),
      0 0 70px rgba(30,140,255,0.3);
  }
  .ls-logo-sub {
    font-size: 11px;
    color: rgba(190,220,255,0.95);
    letter-spacing: 3.5px;
    text-transform: uppercase;
    margin-top: 8px;
    text-align: center;
    font-weight: 600;
    text-shadow: 0 0 12px rgba(120,180,255,0.5);
  }
  .ls-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(120,170,255,0.6), transparent);
    margin: 24px 0;
  }

  /* ── INPUTS ── */
  .ls-login .input {
    background: rgba(8, 18, 80, 0.7) !important;
    border: 1.5px solid rgba(100,155,255,0.5) !important;
    color: #ffffff !important;
    border-radius: 10px !important;
    font-size: 14.5px !important;
    padding: 12px 15px !important;
    width: 100% !important;
    box-sizing: border-box !important;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s !important;
    margin-top: 7px !important;
    font-weight: 500 !important;
  }
  .ls-login .input::placeholder { color: rgba(160,195,255,0.55) !important; }
  .ls-login .input:focus {
    border-color: rgba(140,200,255,0.9) !important;
    outline: none !important;
    box-shadow: 0 0 0 3px rgba(80,140,255,0.28), 0 0 20px rgba(80,140,255,0.18) !important;
    background: rgba(12, 24, 100, 0.82) !important;
  }

  /* ── LABELS ── */
  .ls-login .label {
    color: #c8e0ff !important;
    font-size: 11.5px !important;
    font-weight: 700 !important;
    letter-spacing: 1.3px !important;
    text-transform: uppercase !important;
    margin-top: 14px !important;
    display: block !important;
  }

  /* ── BUTTONS ── */
  .ls-login .btn {
    background: rgba(20, 50, 160, 0.6);
    border: 1.5px solid rgba(110,165,255,0.55);
    color: #d8eaff;
    border-radius: 10px;
    font-size: 13.5px;
    padding: 9px 20px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .ls-login .btn:hover {
    background: rgba(35, 72, 200, 0.78);
    border-color: rgba(150,200,255,0.8);
    color: #ffffff;
    transform: translateY(-1px);
    box-shadow: 0 5px 20px rgba(40,100,240,0.4);
  }
  .ls-login .btn.primary {
    background: linear-gradient(135deg, #3568f5 0%, #2450e0 50%, #163acc 100%);
    border: none;
    color: #ffffff;
    font-weight: 800;
    letter-spacing: 0.6px;
    box-shadow: 0 6px 28px rgba(40,90,240,0.65), inset 0 1px 0 rgba(255,255,255,0.25);
    padding: 13px 18px;
    text-shadow: 0 1px 4px rgba(0,0,100,0.45);
  }
  .ls-login .btn.primary:hover {
    background: linear-gradient(135deg, #4a7aff 0%, #3060f0 50%, #2045d8 100%);
    box-shadow: 0 10px 36px rgba(60,110,255,0.75);
    transform: translateY(-2px);
  }
  .ls-login .btn.primary:disabled {
    opacity: 0.5;
    transform: none;
    cursor: not-allowed;
  }

  /* ── ERROR ── */
  .ls-login .err {
    background: rgba(220,50,50,0.18);
    border: 1px solid rgba(255,120,120,0.5);
    color: #ffd0d0;
    border-radius: 10px;
    padding: 11px 15px;
    font-size: 13.5px;
    margin-top: 12px;
    line-height: 1.45;
    font-weight: 500;
  }

  /* ── STEP BADGES for forgot flow ── */
  .ls-step-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(20,55,190,0.5);
    border: 1px solid rgba(110,160,255,0.55);
    border-radius: 20px;
    padding: 5px 15px;
    font-size: 11px;
    font-weight: 800;
    color: #c0dcff;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .ls-step-dot {
    width: 7px; height: 7px;
    background: #70b8ff;
    border-radius: 50%;
    box-shadow: 0 0 10px #70b8ff;
  }
</style>

function useMobile() {
  const [mob, setMob] = React.useState(() => window.innerWidth <= 768);
  React.useEffect(() => {
    const fn = () => setMob(window.innerWidth <= 768);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return mob;
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = "success") => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3800);
  }, []);
  return { toasts, add };
}

function isFirebaseConfigured() {

}

function nowIso() { return new Date().toISOString(); }

function downloadText(filename, text, mime="text/plain") {
  const blob = new Blob([text], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function usersToCsv(users) {
  const cols = ["name","email","createdAt","lastLogin"];
  const esc = (v) => {
    const s = (v ?? "").toString();
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
  };
  const header = cols.join(",");
  const rows = users.map(u => cols.map(c => esc(u[c])).join(","));
  return [header, ...rows].join("\n");
}

let firebaseApp = null;
let firebaseAuth = null;
let firebaseDb = null;

function initFirebase() {
  if (!isFirebaseConfigured()) return false;
  if (firebaseApp) return true;
  firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
  firebaseAuth = firebase.auth();
  firebaseDb = firebase.firestore();
  return true;
}

async function ensureOwner(_email) {
  // Owner is fixed to FIXED_OWNER_EMAIL
  const ref = firebaseDb.doc(FIREBASE_OWNER_DOC);
  const snap = await ref.get();
  if (!snap.exists || (snap.data()?.email || "").toLowerCase() !== FIXED_OWNER_EMAIL) {
    await ref.set({ email: FIXED_OWNER_EMAIL, createdAt: nowIso() }, { merge: true });
  }
  return FIXED_OWNER_EMAIL;
}

async function getOwnerEmail() {
  // Always return fixed owner (and keep Firestore in sync via ensureOwner calls)
  return FIXED_OWNER_EMAIL;
}

async function upsertUserRecord({ uid, name, email }, isSignup=false) {
  const ref = firebaseDb.collection(FIREBASE_USERS_COLLECTION).doc(uid);
  const base = {
    name: name || "",
    email: (email || "").toLowerCase(),
    lastLogin: nowIso()
  };
  if (isSignup) base.createdAt = nowIso();
  await ref.set(base, { merge: true });
}

async function listUsers() {
  const snap = await firebaseDb.collection(FIREBASE_USERS_COLLECTION).orderBy("createdAt", "desc").get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

    } catch(e) {
      const msg = e.message || "";
      if (msg.includes("user-not-found") || msg.includes("wrong-password") || msg.includes("invalid-credential")) {
        setErr("Incorrect email or password. Please try again.");
      } else if (msg.includes("too-many-requests")) {
        setErr("Too many attempts. Please wait a few minutes and try again.");
      } else if (msg.includes("network")) {
        setErr("Network error. Please check your connection.");
      } else {
        setErr(msg.replace("Firebase:", "").replace("Error (auth/", "").replace(").", ".").trim() || "Login failed.");
      }
    }
    finally { setLoading(false); }
  };

  const doSignup = async () => {
    setErr(""); setLoading(true);
    try {
      if (!cfgOk) throw new Error("Firebase not configured.");
      const n = name.trim();
      const em = email.trim().toLowerCase();
      if (!n) throw new Error("Please enter your name.");
      if (!em.includes("@")) throw new Error("Please enter a valid email.");
      if (pass.length < 6) throw new Error("Password must be at least 6 characters.");
      if (pass !== pass2) throw new Error("Passwords do not match.");
      const res = await firebaseAuth.createUserWithEmailAndPassword(em, pass);
      const u = res.user;
      await u.updateProfile({ displayName: n });
      await ensureOwner(em);
      await upsertUserRecord({ uid: u.uid, name: n, email: em }, true);
      const role = em === (FIXED_OWNER_EMAIL||"").toLowerCase() ? "Owner" : "User";
      const initials = (n.split(/\s+/).slice(0,2).map(w=>w[0]).join("")||"U").toUpperCase();
      onLogin({ name: n, email: em, avatar: initials, role });
    } catch(e) { setErr((e.message||"Signup failed.").replace("Firebase:","").trim()); }
    finally { setLoading(false); }
  };

  const sendOtp = async () => {
    setErr(""); setLoading(true);
    try {
      const em = email.trim().toLowerCase();
      if (!em.includes("@")) throw new Error("Please enter a valid email.");
      // Check account exists — match against local demo users OR Firebase accounts
      const isDemoUser = DEMO_USERS.some(u => u.email.toLowerCase() === em)
                      || em === (FIXED_OWNER_EMAIL || "").toLowerCase();
      let hasAccount = isDemoUser;
      if (!hasAccount && initFirebase()) {
        try {
          // Try to send a password reset email — Firebase will throw auth/user-not-found if no account
          await firebaseAuth.sendPasswordResetEmail(em);
          // If we get here, the account exists — set a flag and skip OTP for Firebase users
          setOtpCode("__FIREBASE_RESET__");
          setOtpExpiry(Date.now() + 10 * 60 * 1000);
          setMode("otp");
          return;
        } catch(firebaseErr) {
          const code = firebaseErr.code || "";
          if (code === "auth/user-not-found" || code === "auth/invalid-email") {
            throw new Error("No account found with this email address.");
          }
          // Any other Firebase error — allow proceeding (network issues etc.)
          hasAccount = true;
        }
      }
      if (!hasAccount) throw new Error("No account found with this email address.");
      // Generate 6-digit OTP
      const code = String(Math.floor(100000 + Math.random() * 900000));
      const expiry = Date.now() + 10 * 60 * 1000; // 10 min
      setOtpCode(code);
      setOtpExpiry(expiry);
      // Store in Firestore for server-side verify (best-effort — may fail if Firestore not configured)
      try { await firebaseDb.collection("otps").doc(em).set({ code, expiry }); } catch(_) {}
      // Send via EmailJS (best-effort — OTP is also shown on screen as fallback)
      try {
        await window.emailjs.send("service_giftcomply", "template_otp_reset", {
          to_email: em,
          otp_code: code,
          user_email: em,
          expiry_mins: "10"
        }, "YOUR_EMAILJS_PUBLIC_KEY");
      } catch(_) {}
      // Always proceed to OTP screen — code is shown on screen
      setMode("otp");
    } catch(e) {
      setErr(e.message || "Failed to send OTP.");
    }
    finally { setLoading(false); }
  };

  const verifyOtp = async () => {
    setErr(""); setLoading(true);
    try {
      if (!otpCode) throw new Error("OTP not found. Please request a new one.");
      // Firebase users: a reset email was already sent — just show success
      if (otpCode === "__FIREBASE_RESET__") {
        setSuccessMsg("Password reset email sent to " + email.trim().toLowerCase() + ". Please check your inbox.");
        setMode("login");
        setEmail("");
        return;
      }
      if (Date.now() > otpExpiry) throw new Error("OTP has expired. Please request a new one.");
      if (otpInput.trim() !== otpCode) throw new Error("Incorrect OTP. Please try again.");
      try { if (firebaseDb) await firebaseDb.collection("otps").doc(email.trim().toLowerCase()).delete(); } catch(_) {}
      setMode("newpass");
    } catch(e) { setErr(e.message || "Verification failed."); }
    finally { setLoading(false); }
  };

  const doResetPassword = async () => {
    setErr(""); setLoading(true);
    try {
      if (newPass.length < 6) throw new Error("Password must be at least 6 characters.");
      if (newPass !== newPass2) throw new Error("Passwords do not match.");
      const em = email.trim().toLowerCase();
      const demoUser = DEMO_USERS.find(u => u.email.toLowerCase() === em);
      if (demoUser) {
        // Update demo user password in memory
        demoUser.password = newPass;
        setSuccessMsg("Password updated successfully. You can now log in with your new password.");
      } else {
        // Firebase account — send reset email
        try {
          await firebaseAuth.sendPasswordResetEmail(em);
          setSuccessMsg("Password reset email sent to " + em + ". Please check your inbox.");
        } catch(_) {
          setSuccessMsg("Password reset initiated. Please check your email.");
        }
      }
      try { await firebaseDb.collection("otps").doc(em).delete(); } catch(_) {}
      setMode("login");
      setEmail("");
    } catch(e) { setErr(e.message || "Reset failed."); }
    finally { setLoading(false); }
  };

  const inputStyle = {
    width: "100%", padding: "10px 14px", background: "rgba(255,255,255,0.05)",
    border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, color: "#e2e8f0",
    fontFamily: "inherit", fontSize: 14, outline: "none", boxSizing: "border-box", marginTop: 6
  };

  return (
    <div className="ls-login">
      <div className="ls-grid-bg"></div>
      {showOwner && <OwnerPanel currentEmail={email} onClose={() => setShowOwner(false)} />}

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA//Z"
            alt="GIFTComply"
            style={{
              width: "260px",
              maxWidth: "90%",
              objectFit: "contain",
              filter: "drop-shadow(0 4px 24px rgba(80,150,255,0.18))",
              marginBottom: "4px"
            }}
          />
          <div className="ls-logo-sub" style={{ marginTop: 6, color: "#1a46cc", letterSpacing: "2.5px", fontSize: "10px", fontWeight: 600 }}>✦ IFSC Compliance Assistant ✦</div>
        </div>
        <div className="ls-divider"></div>

        {/* Tabs */}
        {(mode === "login" || mode === "signup") && (
          <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
            <button className={"btn " + (mode === "login" ? "primary" : "")} onClick={() => setMode("login")} disabled={loading}>Log in</button>
            <button className={"btn " + (mode === "signup" ? "primary" : "")} onClick={() => setMode("signup")} disabled={loading}>Sign up</button>
          </div>
        )}

        {/* Back link */}
        {(mode === "forgot" || mode === "otp" || mode === "newpass") && (
          <button onClick={() => { setMode("login"); setErr(""); setOtpInput(""); }} style={{ background: "none", border: "none", color: "#b0ccff", fontSize: 13, cursor: "pointer", marginTop: 12, padding: 0 }}>← Back to Login</button>
        )}

        {/* Success banner */}
        {successMsg && (
          <div style={{ marginTop: 12, padding: "12px 14px", background: "rgba(20,70,200,0.2)", border: "1px solid rgba(100,170,255,0.5)", borderRadius: 10, color: "#c0dcff", fontSize: 13, lineHeight: 1.5, fontWeight: 500 }}>
            ✅ {successMsg}
          </div>
        )}

        {/* ── LOGIN ── */}
        {mode === "login" && (
          <div style={{ marginTop: 16 }}>
            <div className="label">Email</div>
            <input className="input" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@company.com" onKeyDown={e => e.key==="Enter" && doLogin()} />
            <div className="label" style={{ marginTop: 12 }}>Password</div>
            <input className="input" type="password" value={pass} onChange={e => setPass(e.target.value)} placeholder="••••••••" onKeyDown={e => e.key==="Enter" && doLogin()} />
            <div style={{ textAlign: "right", marginTop: 6 }}>
              <button onClick={() => setMode("forgot")} style={{ background: "none", border: "none", color: "#60c8ff", fontSize: 12, cursor: "pointer", padding: 0 }}>Forgot password?</button>
            </div>
            {err && <div className="err" style={{ marginTop: 10 }}>{err}</div>}
            <button className="btn primary" style={{ width: "100%", marginTop: 14 }} onClick={doLogin} disabled={loading}>
              {loading ? "Please wait…" : "Log in"}
            </button>
            <div style={{ color: "#a8c4f0", fontSize: 12, marginTop: 12, lineHeight: 1.5 }}>
              Accounts stored via <b>Firebase Auth + Firestore</b>.{" "}
              <button className="btn" style={{ padding: "4px 10px", fontSize: 11, marginLeft: 6 }} onClick={() => setShowOwner(true)}>Owner Console</button>
            </div>
          </div>
        )}

        {/* ── SIGNUP ── */}
        {mode === "signup" && (
          <div style={{ marginTop: 16 }}>
            <div className="label">Full Name</div>
            <input className="input" value={name} onChange={e => setName(e.target.value)} placeholder="Your name" />
            <div className="label" style={{ marginTop: 12 }}>Email</div>
            <input className="input" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@company.com" />
            <div className="label" style={{ marginTop: 12 }}>Password</div>
            <input className="input" type="password" value={pass} onChange={e => setPass(e.target.value)} placeholder="Min. 6 characters" />
            <div className="label" style={{ marginTop: 12 }}>Confirm Password</div>
            <input className="input" type="password" value={pass2} onChange={e => setPass2(e.target.value)} placeholder="Re-enter password" onKeyDown={e => e.key==="Enter" && doSignup()} />
            {err && <div className="err" style={{ marginTop: 10 }}>{err}</div>}
            <button className="btn primary" style={{ width: "100%", marginTop: 14 }} onClick={doSignup} disabled={loading}>
              {loading ? "Creating account…" : "Create account"}
            </button>
          </div>
        )}

        {/* ── FORGOT PASSWORD - Step 1: Email ── */}
        {mode === "forgot" && (
          <div style={{ marginTop: 16 }}>
            <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 4, color: "#ffffff" }}>Forgot Password?</div>
            <div style={{ color: "#b0caff", fontSize: 13, marginBottom: 16, lineHeight: 1.5 }}>
              Enter your registered email address. We'll send a <b style={{ color: "#ffffff" }}>6-digit OTP</b> to verify your identity.
            </div>
            <div className="label">Registered Email</div>
            <input className="input" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@company.com" onKeyDown={e => e.key==="Enter" && sendOtp()} />
            {err && <div className="err" style={{ marginTop: 10 }}>{err}</div>}
            <button className="btn primary" style={{ width: "100%", marginTop: 14 }} onClick={sendOtp} disabled={loading}>
              {loading ? "Sending OTP…" : "Send OTP →"}
            </button>
          </div>
        )}

        {/* ── OTP VERIFICATION - Step 2 ── */}
        {mode === "otp" && (
          <div style={{ marginTop: 16 }}>
            <div style={{ fontWeight: 800, fontSize: 17, marginBottom: 4, color: "#ffffff" }}>Enter OTP</div>
            <div style={{ color: "#b0caff", fontSize: 13, marginBottom: 16, lineHeight: 1.5 }}>
              A 6-digit OTP was sent to <b style={{ color: "#60c8ff" }}>{email}</b>.<br/>It expires in <b style={{ color: "#ffffff" }}>10 minutes</b>.
            </div>
            {otpCode === "__FIREBASE_RESET__" ? (
              /* Firebase account: reset email already sent, just confirm */
              <div>

// ─── NEW SCAN PAGE ────────────────────────────────────────────────────────────

function ScanPage({ toast, user, onScanComplete }) {
  const [text, setText] = useState("");
  const [scanning, setScanning] = useState(false);
  const [stepIdx, setStepIdx] = useState(-1);
  const [progress, setProgress] = useState(0);
  const [result, setResult] = useState(null);
  const [openFindings, setOpenFindings] = useState({});
  const [copiedId, setCopiedId] = useState(null);
  const [scopes, setScopes] = useState([]);
  const [scanSteps, setScanSteps] = useState(SCAN_STEPS);
  // activeFilter: null | { kind: "severity"|"type", value: string }
  const [activeFilter, setActiveFilter] = useState(null);

  const toggleFilter = (kind, value) => {
    setActiveFilter(prev =>
      prev && prev.kind === kind && prev.value === value ? null : { kind, value }
    );
  };
  const fileRef = useRef();
  const [fileLoading, setFileLoading] = useState(false);

  const scopeList = ["FEMA", "RBI", "IFSCA", "SEZ Act", "SEBI", "PMLA", "Companies Act", "Income Tax Act", "Labour Laws", "IREDA", "Banking Act"];

  const toggleScope = s => setScopes(prev => prev.includes(s) ? prev.filter(x => x !== s) : [...prev, s]);

  const handleFile = async e => {
    const file = e.target.files[0];
    if (!file) return;
    if (fileRef.current) fileRef.current.value = "";

    const ext = (file.name.match(/\.(\w+)$/) || [])[1]?.toLowerCase();
    if (!["txt", "pdf", "doc", "docx"].includes(ext)) {
      toast("Unsupported file type. Use TXT, PDF, DOC, or DOCX.", "error");
      return;
    }

    setFileLoading(true);
    // Let the loading state render before heavy work
    await new Promise(r => setTimeout(r, 60));

    try {
      let extracted = "";

      if (ext === "pdf") {
        // ── PDF: use pdf.js to extract text from all pages ──────────────────
        const pdfjsLib = window["pdfjs-dist/build/pdf"];
        if (!pdfjsLib) throw new Error("PDF library not loaded yet. Please retry.");
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const parts = [];
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          const pageText = content.items.map(item => item.str).join(" ");
          parts.push(pageText);
        }
        extracted = parts.join("\n\n");

      } else if (ext === "docx") {
        // ── DOCX: use mammoth.js to extract raw text ─────────────────────────
        if (!window.mammoth) throw new Error("DOCX library not loaded yet. Please retry.");
        const arrayBuffer = await file.arrayBuffer();
        const result = await window.mammoth.extractRawText({ arrayBuffer });
        extracted = result.value;

      } else {
        // ── TXT / DOC: plain text read ────────────────────────────────────────
        extracted = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = ev => resolve(ev.target.result);
          reader.onerror = () => reject(new Error("Failed to read file."));
          reader.readAsText(file, "utf-8");
        });
      }

      if (!extracted || extracted.trim().length < 20) {
        throw new Error("Could not extract readable text from this file. Try copy-pasting the content instead.");
      }

      // Defer the heavy setState so the UI stays responsive
      await new Promise(r => setTimeout(r, 30));
      setText(extracted);
      toast(`✓ ${file.name} loaded — ${extracted.length.toLocaleString()} characters`);

    } catch (err) {
      toast(err.message || "Failed to read file.", "error");
    } finally {
      setFileLoading(false);
    }
  };

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  const runScan = async () => {
    if (!text.trim() || text.trim().length < 50) { toast("Please enter at least 50 characters of agreement text.", "error"); return; }
    if (!scopes.length) { toast("Select at least one regulation scope.", "error"); return; }
    // No API key needed — proxy handles auth
    setScanning(true); setResult(null); setProgress(0); setStepIdx(0);

    // Build dynamic steps from selected scopes only
    const dynamicSteps = [
      { label: "PARSING DOCUMENT", sub: "Extracting clauses and structure…", pct: 5 },
      ...scopes.map((s, i) => ({
        label: s.toUpperCase() + " SCAN",
        sub: `Checking ${s} compliance…`,
        pct: Math.round(5 + ((i + 1) / scopes.length) * 86)
      })),
      { label: "GENERATING CLAUSES", sub: "Drafting corrective suggestions…", pct: 93 },
      { label: "FINALIZING REPORT", sub: "Compiling risk score…", pct: 98 },
    ];
    setScanSteps(dynamicSteps);

    for (let i = 0; i < dynamicSteps.length; i++) {
      setStepIdx(i);
      setProgress(dynamicSteps[i].pct);
      await sleep(480);
    }

    try {
      const res = await callClaudeAPI(text, scopes);
      setProgress(100);
      await sleep(300);
      setResult(res);
      onScanComplete({ ...res, docName: "Agreement_" + Date.now(), user: user.name, avatar: user.avatar });
      toast("Scan complete! " + res.findings.length + " findings identified.");
    } catch (err) {
      toast("AI scan failed: " + (err.message || "Try again."), "error");
    }
    setScanning(false); setStepIdx(-1);
  };

      @media print{button{display:none}}
    </style></head><body>
      <h1 style="color:#1a3a6e;">GIFT<span style="color:#2d7d32;">Comply</span> — AI Compliance Report</h1>
      <p style="color:#666;font-size:13px;">Generated: ${new Date().toLocaleString()} · By: ${user.name}</p>
      <hr/>
      <h2>Overall Risk: <span class="badge ${result.overall_risk.toLowerCase()}">${result.overall_risk}</span> — Score: ${result.risk_score}/100</h2>

      <h3>Action Plan</h3>
      <ol>${(result.action_items || []).map(a => `<li style="margin:6px 0;font-size:13px;">${typeof a === "string" ? a : a.text}</li>`).join("")}</ol>
      <p style="margin-top:32px;font-size:11px;color:#999;">This is an AI-generated report and does not constitute legal advice. Consult a qualified FEMA/IFSCA attorney.</p>

  return (
    <div className="gc-page-pad anim-fade" style={{ padding: 28, position: "relative", zIndex: 1 }}>

        <>

              <button

                  borderRadius: 6, color: fileLoading ? "rgba(45,212,160,0.5)" : "#2dd4a0",
                  fontFamily: "'Syne',sans-serif", fontSize: 12, fontWeight: 600,

                  <span className="mono" style={{ fontSize: 11, color: "#2dd4a0", letterSpacing: "2px", textTransform: "uppercase" }}>Extracting text…</span>
                </div>

            <textarea
              value={text}
              onChange={e => setText(e.target.value)}
              placeholder={`Paste your agreement, contract, or MOU here...\n\nExample: This Service Agreement is entered into between XYZ IFSC Unit Ltd., registered in GIFT City, Gujarat, and ABC Global Ltd. (Cayman Islands). Services include cross-border financial advisory and fund management. Fees shall be remitted in USD to offshore account...`}
              className="gc-textarea"
              style={{
                width: "100%", minHeight: 240, background: "#0d1420", border: "none",
                padding: "20px 22px", color: "#e2e8f0", fontFamily: "'JetBrains Mono',monospace",
                fontSize: 13, lineHeight: 1.75, resize: "vertical", outline: "none",
                boxSizing: "border-box"
              }}
            />
            </div>
            <div className="gc-char-bar" style={{ padding: "10px 16px", background: "#0a0f1a", borderTop: "1px solid #131e2e", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 11, color: "#4a5568" }}>
                {text.length > 100000 ? "⚠️ Document exceeds 100,000 chars — only first portion will be analysed" : text.length > 0 ? "✓ Full document will be analysed" : ""}
              </span>

          </div>
        </>
      )}

      {/* SCANNING STATE */}
      {scanning && (
        <div className="anim-fade" style={{
          background: "#0d1420", border: "1px solid #1a2538", borderRadius: 16,
          padding: "64px 32px", textAlign: "center"

          <div style={{ position: "relative", width: 120, height: 120, margin: "0 auto 32px" }}>
            <div style={{ position: "absolute", inset: 0, border: "1px solid rgba(45,212,160,0.15)", borderRadius: "50%" }} />
            <div style={{ position: "absolute", inset: 0, background: "conic-gradient(rgba(45,212,160,0.15) 0deg,transparent 70deg,transparent 360deg)", borderRadius: "50%", animation: "sweep 2s linear infinite" }} />

            <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 36 }}>🔍</div>
          </div>
          <div className="mono" style={{ fontSize: 14, letterSpacing: "3px", color: "#2dd4a0", textTransform: "uppercase", marginBottom: 8 }}>
            {stepIdx >= 0 && scanSteps[stepIdx] ? scanSteps[stepIdx].label : "ANALYZING"}
          </div>
          <div style={{ fontSize: 13, color: "#64748b", marginBottom: 28 }}>
            {stepIdx >= 0 && scanSteps[stepIdx] ? scanSteps[stepIdx].sub : ""}
          </div>
          <div style={{ maxWidth: 360, margin: "0 auto" }}>
            <div style={{ height: 4, background: "#131e2e", borderRadius: 4, overflow: "hidden", marginBottom: 8 }}>
              <div style={{ height: "100%", width: `${progress}%`, background: "linear-gradient(90deg,#2dd4a0,#1ab88a)", borderRadius: 4, transition: "width .4s ease", boxShadow: "0 0 8px rgba(45,212,160,0.5)" }} />
            </div>
            <div className="mono" style={{ fontSize: 11, color: "#4a5568", textAlign: "right" }}>{progress}%</div>
          </div>
          <div style={{ maxWidth: 320, margin: "20px auto 0", display: "flex", flexDirection: "column", gap: 5, textAlign: "left" }}>
            {scanSteps.map((s, i) => (
              <div key={i} className="mono" style={{
                fontSize: 10, display: "flex", alignItems: "center", gap: 8,
                color: i < stepIdx ? "#2dd4a0" : i === stepIdx ? "#e2e8f0" : "#374151"
              }}>
                <span style={{ width: 14 }}>{i < stepIdx ? "✓" : i === stepIdx ? "▶" : "○"}</span>
                {s.label}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* RESULTS */}
      {result && !scanning && (
        <div className="anim-fade">
          {/* Risk overview */}
          {(() => {
            const rc = result.overall_risk === "HIGH" ? "#ff6b6b" : result.overall_risk === "MEDIUM" ? "#ffa94d" : "#2dd4a0";
            const circ = 2 * Math.PI * 44;
            const offset = circ - (result.risk_score / 100) * circ;
            return (
              <div className="gc-result-grid" style={{
                display: "grid", gridTemplateColumns: "auto 1fr", background: "#0d1420",
                border: "1px solid #1a2538", borderRadius: 16, overflow: "hidden", marginBottom: 20
              }}>
                <div className="gc-result-left" style={{ padding: "32px 28px", background: "#0a0f1a", borderRight: "1px solid #131e2e", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12, minWidth: 170 }}>
                  <div style={{ position: "relative", width: 110, height: 110 }}>
                    <svg width="110" height="110" viewBox="0 0 110 110" style={{ transform: "rotate(-90deg)" }}>
                      <circle cx="55" cy="55" r="44" fill="none" stroke="#131e2e" strokeWidth="8" />
                      <circle cx="55" cy="55" r="44" fill="none" stroke={rc} strokeWidth="8" strokeLinecap="round"
                        strokeDasharray={circ} strokeDashoffset={offset} />
                    </svg>
                    <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                      <span className="mono" style={{ fontSize: 28, fontWeight: 500, color: rc, lineHeight: 1 }}>{result.risk_score}</span>
                      <span className="mono" style={{ fontSize: 9, color: "#4a5568", letterSpacing: "1.5px", marginTop: 2 }}>RISK</span>
                    </div>
                  </div>
                  <RiskBadge risk={result.overall_risk} />
                </div>
                <div className="gc-result-right" style={{ padding: 28 }}>
                  <h2 className="serif" style={{ fontSize: 22, marginBottom: 10 }}>{result.risk_title || "Compliance Assessment Complete"}</h2>
                  <p style={{ fontSize: 14, color: "#94a3b8", lineHeight: 1.8, marginBottom: 22 }}>{result.summary}</p>
                  {/* ── Unified stats: clickable severity row + type row ── */}
                  {(() => {
                    const violations = result.findings.filter(f => (f.finding_type || "VIOLATION").toUpperCase() === "VIOLATION").length;
                    const missing    = result.findings.filter(f => (f.finding_type || "").toUpperCase() === "MISSING").length;
                    const overstated = result.findings.filter(f => (f.finding_type || "").toUpperCase() === "OVERSTATED").length;
                    const sevRows = [
                      ["CRITICAL", "Critical",   result.stats?.critical  || 0, "#ff6b6b", "rgba(255,107,107,0.14)", "rgba(255,107,107,0.35)"],
                      ["HIGH",     "High",        result.stats?.high      || 0, "#ffa94d", "rgba(255,169,77,0.14)",  "rgba(255,169,77,0.35)"],
                      ["MEDIUM",   "Medium",      result.stats?.medium    || 0, "#2dd4a0", "rgba(45,212,160,0.12)",  "rgba(45,212,160,0.3)"],
                      ["INFO",     "Info",        result.stats?.info      || 0, "#74c0fc", "rgba(116,192,252,0.12)", "rgba(116,192,252,0.3)"],
                    ];
                    const typeRows = [
                      ["VIOLATION",  "⛔ Violations", violations, "#ff6b6b", "rgba(255,107,107,0.1)",  "rgba(255,107,107,0.3)"],
                      ["MISSING",    "🕳 Missing",    missing,    "#ffd43b", "rgba(255,212,59,0.1)",   "rgba(255,212,59,0.3)"],
                      ["OVERSTATED", "⚠️ Overstated", overstated, "#f06595", "rgba(240,101,149,0.1)",  "rgba(240,101,149,0.3)"],
                    ];

                    const ChipRow = ({ rows, kind, label }) => (
                      <div>
                        <div className="mono" style={{ fontSize: 9, letterSpacing: "1.5px", color: "#374151", textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
                        <div style={{ display: "flex", gap: 0, background: "#070b12", border: "1px solid #131e2e", borderRadius: 10, overflow: "hidden" }}>
                          {rows.map(([val, lbl, n, c, bg, activeBorder], i) => {
                            const isActive = activeFilter && activeFilter.kind === kind && activeFilter.value === val;
                            const canClick = n > 0;
                            return (
                              <div key={val}
                                onClick={() => canClick && toggleFilter(kind, val)}
                                style={{
                                  flex: 1, padding: "14px 16px", display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                                  background: isActive ? (n > 0 ? bg : "transparent") : n > 0 ? bg.replace(/[\d.]+\)$/, m => (parseFloat(m)*0.6).toFixed(2)+")") : "transparent",
                                  borderRight: i < rows.length - 1 ? "1px solid #131e2e" : "none",
                                  cursor: canClick ? "pointer" : "default",
                                  outline: isActive ? `2px solid ${activeBorder}` : "none",
                                  outlineOffset: "-2px",
                                  transition: "all .18s",
                                  position: "relative"
                                }}
                              >
                                {isActive && <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: c, borderRadius: "2px 2px 0 0" }} />}

                                <span className="mono" style={{ fontSize: 9, letterSpacing: "1px", color: n > 0 ? c : "#2a3548", textTransform: "uppercase", opacity: n > 0 ? 1 : 0.4 }}>{lbl}</span>
                                {isActive && <span style={{ fontSize: 8, color: c, marginTop: 1 }}>● active</span>}
                              </div>

                          })}

                      </div>
                    );

                    return (
                      <div className="gc-stat-chips" style={{ display: "flex", flexDirection: "column", gap: 10 }}>

                        <ChipRow rows={typeRows} kind="type" label="By Finding Type — click to filter" />

          {/* Regulation heatmap */}
          {result.regulation_scores && (
            <div style={{ background: "#0d1420", border: "1px solid #1a2538", borderRadius: 14, padding: 24, marginBottom: 20 }}>

              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(140px,1fr))", gap: 10 }}>
                {Object.entries(result.regulation_scores).map(([reg, d]) => {
                  if (!d || d.score === null || d.score === undefined) return null;
                  const normKey = reg.replace(/ /g, "_"); // normalize in case AI used spaces
                  const m = REG_META[normKey] || REG_META.IFSCA;

                    <div key={reg} style={{ background: m.bg, border: `1px solid ${m.border}`, borderRadius: 10, padding: "14px 16px" }}>

                      <div style={{ fontSize: 10, color: "#64748b", marginTop: 3 }}>{d.label}</div>

            const filtered = activeFilter
              ? activeFilter.kind === "severity"

                : result.findings.filter(f => (f.finding_type || "VIOLATION").toUpperCase() === activeFilter.value)
              : result.findings;

            // ── Finding card renderer ─────────────────────────────────────────
            const FindingCard = ({ f }) => {
              const sev = (f.severity || "INFO").toUpperCase();
              const sm  = SEV_META[sev] || SEV_META.INFO;
              const ft  = (f.finding_type || "VIOLATION").toUpperCase();
              const fm  = FINDING_TYPE_META[ft] || FINDING_TYPE_META.VIOLATION;
              const isOpen = openFindings[f.id];
              return (
                <div key={f.id} style={{
                  background: "#0d1420", border: `1px solid ${isOpen ? sm.border : "#1a2538"}`,

                }}>
                  <div onClick={() => toggleFinding(f.id)} style={{
                    display: "flex", alignItems: "center", gap: 14, padding: "16px 20px", cursor: "pointer"

                      fontSize: 9, fontWeight: 600, padding: "3px 9px", borderRadius: 3, letterSpacing: "0.8px",

                    }}>{sev}</span>
                    <span className="mono" style={{
                      fontSize: 9, fontWeight: 600, padding: "3px 9px", borderRadius: 3, letterSpacing: "0.8px",
                      textTransform: "uppercase", flexShrink: 0, background: fm.bg, border: `1px solid ${fm.border}`, color: fm.color
                    }}>{fm.icon} {fm.label}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div className="gc-finding-title" style={{ fontSize: 14, fontWeight: 700, marginBottom: 4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.title}</div>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                        {[f.regulation, f.section].filter(Boolean).map((t, i) => (
                          <span key={i} className="mono" style={{ fontSize: 10, padding: "2px 7px", background: "#070b12", border: "1px solid #131e2e", borderRadius: 3, color: "#64748b" }}>{t}</span>
                        ))}
                      </div>
                    </div>
                    <span style={{ color: "#374151", fontSize: 12, transition: "transform .2s", transform: isOpen ? "rotate(90deg)" : "none" }}>▶</span>
                  </div>
                  {isOpen && (
                    <div className="gc-finding-expand" style={{ borderTop: "1px solid #131e2e", padding: "20px 22px" }}>
                      {f.clause_location && (
                        <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 14, padding: "10px 14px", background: "rgba(116,192,252,0.06)", border: "1px solid rgba(116,192,252,0.15)", borderRadius: 8 }}>
                          <span style={{ fontSize: 15, flexShrink: 0 }}>📍</span>
                          <div>
                            <div className="mono" style={{ fontSize: 9, color: "#74c0fc", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 3 }}>Location in Document</div>
                            <div style={{ fontSize: 13, color: "#cbd5e1", lineHeight: 1.6 }}>{f.clause_location}</div>
                          </div>
                        </div>
                      )}
                      {f.problematic_text && (() => {
                        const isMissing    = ft === "MISSING";
                        const isOverstated = ft === "OVERSTATED";
                        const bgColor      = isMissing ? "rgba(255,212,59,0.05)"    : isOverstated ? "rgba(240,101,149,0.05)"   : "rgba(255,107,107,0.05)";
                        const borderColor  = isMissing ? "rgba(255,212,59,0.2)"     : isOverstated ? "rgba(240,101,149,0.2)"    : "rgba(255,107,107,0.18)";
                        const labelColor   = isMissing ? "#ffd43b"                  : isOverstated ? "#f06595"                  : "#ff6b6b";
                        const labelText    = isMissing ? "🕳 Mandatory Clause Absent" : isOverstated ? "⚠️ Overstated Provision" : "⛔ Problematic Text Found";
                        const textColor    = isMissing ? "#fef08a"                  : isOverstated ? "#f9a8d4"                  : "#fca5a5";
                        return (
                          <div style={{ marginBottom: 14, padding: "10px 14px", background: bgColor, border: `1px solid ${borderColor}`, borderRadius: 8 }}>
                            <div className="mono" style={{ fontSize: 9, color: labelColor, letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 6 }}>{labelText}</div>
                            <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 12, color: textColor, lineHeight: 1.7, fontStyle: "italic", wordBreak: "break-word", overflowWrap: "break-word" }}>"{f.problematic_text}"</div>
                          </div>
                        );
                      })()}
                      <p style={{ fontSize: 14, color: "#94a3b8", lineHeight: 1.8, marginBottom: 18 }}>{f.description}</p>
                      <div style={{ background: "#070b12", border: `1px solid ${sm.border}`, borderRadius: 10, overflow: "hidden" }}>
                        <div style={{ padding: "10px 16px", background: `${sm.color}0a`, borderBottom: `1px solid ${sm.border}`, display: "flex", alignItems: "center", gap: 8 }}>
                          <span className="mono" style={{ fontSize: 10, letterSpacing: "1.5px", color: sm.color, flex: 1, textTransform: "uppercase" }}>💡 Suggested Correction</span>
                        </div>
                        <div style={{ padding: "16px 18px" }}>
                          <p style={{ fontSize: 13, lineHeight: 1.8, marginBottom: 14 }}>{f.suggestion}</p>
                          {f.clause_example && (
                            <>
                              <div className="gc-clause-code mono" style={{
                                background: "#040710", border: "1px solid #131e2e", borderRadius: 8,
                                padding: "14px 16px", fontSize: 12, lineHeight: 1.8, color: "#7ee8c0",
                                whiteSpace: "pre-wrap", wordBreak: "break-word", overflowX: "auto"
                              }}>
                                <span style={{ color: "#374151" }}>// Suggested Clause:</span>{"\n"}{f.clause_example}
                              </div>
                              <button
                                onClick={() => copyClause(f.id, f.clause_example)}
                                style={{
                                  marginTop: 10, display: "inline-flex", alignItems: "center", gap: 6,
                                  padding: "7px 14px", background: copiedId === f.id ? "rgba(45,212,160,0.15)" : "rgba(45,212,160,0.08)",
                                  border: `1px solid ${copiedId === f.id ? "rgba(45,212,160,0.5)" : "rgba(45,212,160,0.2)"}`,
                                  borderRadius: 6, color: copiedId === f.id ? "#2dd4a0" : "#94a3b8",
                                  fontFamily: "'JetBrains Mono',monospace", fontSize: 11, cursor: "pointer", transition: "all .2s"
                                }}
                              >{copiedId === f.id ? "✓ Copied!" : "📋 Copy Clause"}</button>
                            </>
                          )}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            };

            // ── Active filter banner ──────────────────────────────────────────
            const filterLabels = {
              severity: { CRITICAL: "Critical Severity", HIGH: "High Severity", MEDIUM: "Medium Severity", INFO: "Info" },
              type:     { VIOLATION: "Violations", MISSING: "Missing Clauses", OVERSTATED: "Overstated Provisions" }
            };
            const filterColors = {
              CRITICAL: "#ff6b6b", HIGH: "#ffa94d", MEDIUM: "#2dd4a0", INFO: "#74c0fc",
              VIOLATION: "#ff6b6b", MISSING: "#ffd43b", OVERSTATED: "#f06595"
            };
            const filterBannerColor = activeFilter ? filterColors[activeFilter.value] || "#64748b" : null;
            const filterLabel = activeFilter ? (filterLabels[activeFilter.kind]?.[activeFilter.value] || activeFilter.value) : null;

            // ── Grouped rendering ─────────────────────────────────────────────
            if (filtered.length === 0) {
              return (
                <div>
                  {activeFilter && (
                    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14, padding: "10px 16px", background: "#0d1420", border: `1px solid ${filterBannerColor}30`, borderRadius: 10 }}>
                      <span className="mono" style={{ fontSize: 10, color: filterBannerColor, letterSpacing: "1px" }}>FILTER: {filterLabel}</span>
                      <span className="mono" style={{ fontSize: 10, color: "#64748b" }}>· 0 findings</span>
                      <div style={{ flex: 1 }} />
                      <button onClick={() => setActiveFilter(null)} style={{ background: "none", border: "1px solid #1a2538", color: "#64748b", borderRadius: 6, padding: "3px 10px", cursor: "pointer", fontSize: 11 }}>✕ Clear</button>
                    </div>
                  )}
                  <div style={{ padding: "32px 20px", textAlign: "center", color: "#374151", fontSize: 13, background: "#0d1420", border: "1px solid #1a2538", borderRadius: 12 }}>
                    No findings match this filter.
                  </div>
                </div>
              );
            }

            // When filter is active → group by regulation
            if (activeFilter) {
              const byReg = {};
              filtered.forEach(f => {
                const r = f.regulation || "Unknown";
                if (!byReg[r]) byReg[r] = [];
                byReg[r].push(f);
              });
              return (
                <div>
                  {/* Active filter banner */}
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14, padding: "10px 16px", background: "#0d1420", border: `1px solid ${filterBannerColor}40`, borderLeft: `3px solid ${filterBannerColor}`, borderRadius: 10 }}>
                    <span className="mono" style={{ fontSize: 10, color: filterBannerColor, letterSpacing: "1px", textTransform: "uppercase" }}>◉ Filtering: {filterLabel}</span>
                    <span className="mono" style={{ fontSize: 10, color: "#64748b" }}>· {filtered.length} finding{filtered.length !== 1 ? "s" : ""}</span>
                    <div style={{ flex: 1 }} />
                    <button onClick={() => setActiveFilter(null)} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid #1a2538", color: "#94a3b8", borderRadius: 6, padding: "4px 12px", cursor: "pointer", fontSize: 11, display: "flex", alignItems: "center", gap: 5 }}>✕ Clear filter</button>
                  </div>
                  {/* Grouped by regulation */}
                  {Object.entries(byReg).map(([reg, findings]) => (
                    <div key={reg} style={{ marginBottom: 20 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                        <span className="mono" style={{ fontSize: 10, letterSpacing: "2px", color: filterBannerColor, textTransform: "uppercase", whiteSpace: "nowrap" }}>{reg}</span>
                        <div style={{ flex: 1, height: 1, background: "#131e2e" }} />
                        <span className="mono" style={{ fontSize: 10, color: "#374151", background: "#0d1420", border: "1px solid #131e2e", padding: "2px 8px", borderRadius: 100 }}>{findings.length}</span>
                      </div>
                      {findings.map(f => <FindingCard key={f.id} f={f} />)}
                    </div>
                  ))}
                </div>
              );
            }

            // No filter → group by severity (original behavior)
            return (
              <div>
                {["CRITICAL", "HIGH", "MEDIUM", "INFO"].map(sev => {
                  const group = filtered.filter(f => (f.severity || "INFO").toUpperCase() === sev);
                  if (!group.length) return null;
                  const sm = SEV_META[sev];
                  return (
                    <div key={sev} style={{ marginBottom: 20 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                        <span className="mono" style={{ fontSize: 10, letterSpacing: "2px", color: "#64748b", textTransform: "uppercase", whiteSpace: "nowrap" }}>{sev} Findings</span>
                        <div style={{ flex: 1, height: 1, background: "#131e2e" }} />
                        <span className="mono" style={{ fontSize: 10, color: "#374151", background: "#0d1420", border: "1px solid #131e2e", padding: "2px 8px", borderRadius: 100 }}>{group.length}</span>
                      </div>
                      {group.map(f => <FindingCard key={f.id} f={f} />)}
                    </div>
                  );
                })}
              </div>
            );
          })()}

          {/* Action plan */}
          {result.action_items?.length > 0 && (
            <div style={{ background: "#0d1420", border: "1px solid #1a2538", borderRadius: 14, padding: 24, marginBottom: 20 }}>
              <h4 className="serif" style={{ fontSize: 20, marginBottom: 18 }}>Recommended Action Plan</h4>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {result.action_items.map((a, i) => {
                  const item = typeof a === "string" ? { text: a, priority: "STANDARD" } : a;
                  const pc = { IMMEDIATE: { color: "#ff6b6b", bg: "rgba(255,107,107,0.1)", border: "rgba(255,107,107,0.2)" }, SOON: { color: "#ffa94d", bg: "rgba(255,169,77,0.1)", border: "rgba(255,169,77,0.2)" }, STANDARD: { color: "#2dd4a0", bg: "rgba(45,212,160,0.08)", border: "rgba(45,212,160,0.2)" } }[item.priority] || {};
                  return (
                    <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "13px 16px", background: "#070b12", border: "1px solid #131e2e", borderRadius: 10, minWidth: 0 }}>
                      <span className="mono" style={{ width: 22, height: 22, minWidth: 22, background: "rgba(45,212,160,0.08)", border: "1px solid rgba(45,212,160,0.2)", color: "#2dd4a0", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, flexShrink: 0, marginTop: 2 }}>{i + 1}</span>
                      <span className="mono" style={{ fontSize: 9, padding: "2px 6px", borderRadius: 3, letterSpacing: "0.6px", textTransform: "uppercase", flexShrink: 0, marginTop: 3, background: pc.bg, border: `1px solid ${pc.border}`, color: pc.color, whiteSpace: "nowrap" }}>{item.priority}</span>
                      <span style={{ fontSize: 13, lineHeight: 1.7, wordBreak: "break-word", minWidth: 0 }}>{item.text}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Export + New Scan */}
          <div className="gc-action-btns" style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 20 }}>
            <button onClick={exportPDF} style={{
              display: "flex", alignItems: "center", justifyContent: "center", gap: 7, padding: "11px 22px",
              background: "#2dd4a0", color: "#000", border: "none", borderRadius: 8,
              fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 13, cursor: "pointer"
            }}>📥 Export PDF Report</button>
            <button onClick={() => { setResult(null); setText(""); }} style={{
              padding: "11px 20px", background: "transparent", border: "1px solid #1a2538",
              borderRadius: 8, color: "#64748b", fontFamily: "'Syne',sans-serif", fontSize: 13, cursor: "pointer"
            }}>↩ New Scan</button>
          </div>

          <div style={{ fontSize: 11, color: "#374151", background: "rgba(255,169,77,0.05)", border: "1px solid rgba(255,169,77,0.15)", borderRadius: 8, padding: "12px 16px", lineHeight: 1.7 }}>
            ⚖️ <strong style={{ color: "#ffa94d" }}>Legal Disclaimer:</strong> AI-generated findings are for informational purposes only. Consult a qualified FEMA/IFSCA attorney before acting on any findings.
          </div>
        </div>
      )}
    </div>
  );
}

// ─── HISTORY PAGE ─────────────────────────────────────────────────────────────

function HistoryPage({ history, toast }) {
  const [filter, setFilter] = useState("ALL");
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);

  const all = [...history, ...SAMPLE_HISTORY];
  const filtered = all.filter(s => {
    const matchRisk = filter === "ALL" || s.risk === filter;
    const matchSearch = !search || s.docName.toLowerCase().includes(search.toLowerCase()) || s.user.toLowerCase().includes(search.toLowerCase());
    return matchRisk && matchSearch;
  });

  const exportAll = () => {
    const blob = new Blob([JSON.stringify(all, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `giftcomply-history-${Date.now()}.json`; a.click();
    URL.revokeObjectURL(url);
    toast("Scan history exported.");
  };

  return (
    <div className="gc-page-pad anim-fade" style={{ padding: 28, position: "relative", zIndex: 1 }}>
      {/* Controls */}
      <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap", alignItems: "center" }}>
        <input
          placeholder="🔍 Search documents or users…"
          value={search}
          onChange={e => setSearch(e.target.value)}
          style={{
            flex: "1 1 200px", minWidth: 0, width: "100%", background: "#0d1420", border: "1px solid #1a2538",
            borderRadius: 8, padding: "10px 14px", color: "#e2e8f0",
            fontFamily: "'Syne',sans-serif", fontSize: 13, outline: "none", boxSizing: "border-box"
          }}
          onFocus={e => e.target.style.borderColor = "#2dd4a0"}
          onBlur={e => e.target.style.borderColor = "#1a2538"}
        />
        {["ALL", "HIGH", "MEDIUM", "LOW"].map(f => (
          <button key={f} onClick={() => setFilter(f)} style={{
            padding: "8px 12px", borderRadius: 7,
            background: filter === f ? "rgba(45,212,160,0.12)" : "transparent",
            border: `1px solid ${filter === f ? "rgba(45,212,160,0.35)" : "#1a2538"}`,
            color: filter === f ? "#2dd4a0" : "#64748b",
            fontFamily: "'JetBrains Mono',monospace", fontSize: 11, cursor: "pointer", letterSpacing: "0.5px"
          }}>{f}</button>
        ))}
        <button onClick={exportAll} style={{
          padding: "9px 16px", background: "rgba(45,212,160,0.1)", border: "1px solid rgba(45,212,160,0.25)",
          borderRadius: 7, color: "#2dd4a0", fontFamily: "'Syne',sans-serif", fontSize: 12, fontWeight: 600, cursor: "pointer"
        }}>📥 Export All</button>
      </div>

      {/* Table */}
      <div style={{ background: "#0d1420", border: "1px solid #1a2538", borderRadius: 14, overflow: "hidden" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr 120px 100px 90px 90px", padding: "12px 20px", borderBottom: "1px solid #131e2e", background: "#0a0f1a" }}>
          {["Scan ID", "Document", "Date", "Risk", "Findings", "Status"].map(h => (
            <span key={h} className="mono" style={{ fontSize: 9, letterSpacing: "1.5px", color: "#4a5568", textTransform: "uppercase" }}>{h}</span>
          ))}
        </div>
        {filtered.length === 0 && (
          <div style={{ padding: "40px", textAlign: "center", color: "#374151", fontSize: 14 }}>No scans found.</div>
        )}
        {filtered.map((s, i) => {
          const statusColor = { Reviewed: "#74c0fc", Pending: "#ffa94d", Cleared: "#2dd4a0" }[s.status] || "#64748b";
          return (
            <div key={s.id + i} onClick={() => setSelected(selected?.id === s.id ? null : s)} className="gc-history-row" style={{
              padding: "14px 20px", borderBottom: "1px solid #0d1420",
              background: selected?.id === s.id ? "rgba(45,212,160,0.04)" : "transparent",
              cursor: "pointer", transition: "background .15s",
              display: "grid", gridTemplateColumns: "1fr 2fr 120px 100px 90px 90px", alignItems: "center"
            }}
              onMouseEnter={e => { if (selected?.id !== s.id) e.currentTarget.style.background = "#0a0f1a"; }}
              onMouseLeave={e => { if (selected?.id !== s.id) e.currentTarget.style.background = "transparent"; }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
                <span className="mono" style={{ fontSize: 11, color: "#2dd4a0", whiteSpace: "nowrap" }}>{s.id || "SCN-" + (i + 10)}</span>
                {/* Mobile: show risk badge next to ID */}
                <span style={{ display: "none" }} className="gc-mobile-risk"><RiskBadge risk={s.risk} small /></span>
              </div>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.docName}</div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 3 }}>
                  <Avatar initials={s.avatar} size={18} color={s.risk === "HIGH" ? "#ff6b6b" : "#2dd4a0"} />
                  <span className="mono" style={{ fontSize: 9, color: "#4a5568" }}>{s.user}</span>
                  <span className="mono gc-history-mobile-date" style={{ fontSize: 9, color: "#374151" }}>{s.date}</span>
                </div>
              </div>
              <div className="gc-history-col-date">
                <div className="mono" style={{ fontSize: 11, color: "#94a3b8" }}>{s.date}</div>
                <div className="mono" style={{ fontSize: 10, color: "#374151" }}>{s.time}</div>
              </div>
              <div className="gc-history-col-risk"><RiskBadge risk={s.risk} small /></div>
              <div>
                <span className="mono" style={{ fontSize: 13, fontWeight: 500, color: s.critical > 0 ? "#ff6b6b" : "#94a3b8" }}>{s.findings}</span>
                <span className="mono" style={{ fontSize: 10, color: "#374151" }}> total</span>
                {s.critical > 0 && <div className="mono" style={{ fontSize: 9, color: "#ff6b6b" }}>{s.critical} critical</div>}
              </div>
              <span className="mono" style={{ fontSize: 10, fontWeight: 500, padding: "2px 8px", borderRadius: 3, background: `${statusColor}15`, border: `1px solid ${statusColor}30`, color: statusColor }}>{s.status}</span>
            </div>
          );
        })}
      </div>

      {/* Expanded row detail */}
      {selected && (
        <div className="anim-fade" style={{ background: "#0d1420", border: "1px solid rgba(45,212,160,0.2)", borderRadius: 12, padding: 24, marginTop: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
            <h4 className="serif" style={{ fontSize: 18 }}>{selected.docName}</h4>
            <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", color: "#64748b", cursor: "pointer", fontSize: 18 }}>✕</button>
          </div>
          <p style={{ fontSize: 13, color: "#94a3b8", marginBottom: 14, lineHeight: 1.7 }}>{selected.summary}</p>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <StatCard num={selected.findings} label="Total Findings" color="#2dd4a0" />
            <StatCard num={selected.critical} label="Critical" color="#ff6b6b" />
            <div style={{ display: "flex", alignItems: "center", gap: 8, background: "#070b12", border: "1px solid #131e2e", borderRadius: 12, padding: "12px 18px" }}>
              <RiskBadge risk={selected.risk} />
              <span style={{ fontSize: 12, color: "#64748b" }}>Risk Level</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TeamPage({ user, toast }) {

    if (!inviteEmail.includes("@")) { toast("Enter a valid email.", "error"); return; }

    setInviteEmail(""); setShowInvite(false);
  };

  return (
    <div className="gc-page-pad anim-fade" style={{ padding: 28, position: "relative", zIndex: 1 }}>

          <h3 className="serif" style={{ fontSize: 24, marginBottom: 4 }}>Team Members</h3>

      <div className="gc-team-grid" style={{ display: "grid", gap: 12 }}>

              borderRadius: 12, padding: "20px 24px", display: "flex", alignItems: "center", gap: 18, flexWrap: "wrap"
            }}>
              <Avatar initials={m.avatar} size={48} color={m.role === "Admin" ? "#2dd4a0" : m.role === "Analyst" ? "#74c0fc" : "#b197fc"} />
              <div style={{ flex: 1, minWidth: 160 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                  <span style={{ fontSize: 15, fontWeight: 700 }}>{m.name}</span>
                  {isYou && <span className="mono" style={{ fontSize: 9, background: "rgba(45,212,160,0.1)", border: "1px solid rgba(45,212,160,0.3)", color: "#2dd4a0", padding: "1px 7px", borderRadius: 3 }}>YOU</span>}
                </div>
                <div style={{ fontSize: 12, color: "#64748b" }}>{m.email}</div>
                <div className="mono" style={{ fontSize: 10, color: "#4a5568", marginTop: 2 }}>{m.dept} · {m.role}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div className="mono" style={{ fontSize: 22, fontWeight: 500, color: "#2dd4a0", lineHeight: 1 }}>{scans}</div>
                <div style={{ fontSize: 11, color: "#64748b" }}>Scans</div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                {["Admin", "Analyst", "Viewer"].map(r => (
                  <button key={r} onClick={() => { if (user.role !== "Admin") { toast("Only admins can change roles.", "error"); return; } toast(`${m.name} role updated to ${r}.`); }} style={{
                    padding: "5px 12px", borderRadius: 6,
                    background: m.role === r ? "rgba(45,212,160,0.1)" : "transparent",
                    border: `1px solid ${m.role === r ? "rgba(45,212,160,0.3)" : "#1a2538"}`,
                    color: m.role === r ? "#2dd4a0" : "#4a5568",
                    fontFamily: "'JetBrains Mono',monospace", fontSize: 10, cursor: "pointer"
                  }}>{r}</button>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── SETTINGS PAGE ────────────────────────────────────────────────────────────

function SettingsPage({ user, toast }) {
  const [notifs, setNotifs] = useState(true);
  const [autoExport, setAutoExport] = useState(false);

function ApiKeySettings({ toast }) {

  function clearKey() {

        </div>
        {hasKey
          ? <span style={{ fontSize: 11, background: "rgba(45,212,160,0.15)", color: "#2dd4a0", border: "1px solid rgba(45,212,160,0.3)", borderRadius: 20, padding: "3px 10px", fontWeight: 700 }}>✓ Key Saved</span>
          : <span style={{ fontSize: 11, background: "rgba(239,68,68,0.15)", color: "#f87171", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 20, padding: "3px 10px", fontWeight: 700 }}>⚠ Not Set</span>
