          {saved ? "✓ Saved" : "Save Key"}
        </button>
        {hasKey && <button onClick={clearKey} style={{ background: "transparent", color: "#f87171", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 8, padding: "10px 14px", fontSize: 13, cursor: "pointer" }}>Clear</button>}
      </div>
      <div style={{ fontSize: 12, color: "#64748b", lineHeight: 1.6 }}>
        🔐 Key is stored only in your browser. 100% free — no credit card required.
      </div>
    </div>
  );
}

// ─── AI API CALL ──────────────────────────────────────────────────────────────

// Normalize any scope name to the underscore key used in REG_META & JSON template
function toRegKey(name) {
  return name.replace(/ /g, "_");
}
// Reverse: key → display label
function fromRegKey(key) {
  return key.replace(/_/g, " ");
}

async function callClaudeAPI(text, scopes) {

  const MAX_CHARS = 100000; // ~25000 tokens of document content
  const docText = text.length > MAX_CHARS
    ? text.substring(0, MAX_CHARS) + "\n\n[NOTE: Document truncated at 100,000 characters due to context limits. Analysis covers above portion.]"
    : text;

  // Build dynamic regulation_scores template — only include selected scopes
  const regScoresTemplate = scopes
    .map(s => `    "${toRegKey(s)}": { "score": 0-100, "label": "6-word assessment", "issues": 0 }`)
    .join(",\n");

  const prompt = `You are a senior Indian regulatory compliance attorney specializing in FEMA 1999, RBI regulations, IFSCA Act 2019, SEZ Act 2005, SEBI IFSC Guidelines, PMLA 2002, Companies Act 2013, Income Tax Act 1961, Labour Laws (Code on Wages 2019, Industrial Relations Code 2020, Code on Social Security 2020, Occupational Safety Code 2020), IREDA Act 1987, and Banking Regulation Act 1949, specifically for GIFT City and Indian corporate transactions.

Carefully read the ENTIRE agreement below and perform a three-dimensional compliance review against the selected regulations:

1. VIOLATIONS — clauses that directly contradict a specific provision of the regulation.
2. MISSING — mandatory clauses, disclosures, or obligations required by the regulation that are entirely absent from this document.
3. OVERSTATED — clauses that claim more rights, protections, or permissions than the regulation actually grants (e.g. overstated repatriation rights, wrong approval thresholds, incorrect exemptions claimed, provisions that misrepresent what the law allows).

Do NOT invent findings. Only flag real, specific issues. If a section is fully compliant and nothing is missing or overstated, say so. Return an empty findings array if there are no issues.

AGREEMENT TEXT:
"""
${docText}
"""

SCOPE (analyze ONLY these regulations — nothing else): ${scopes.map(toRegKey).join(", ")}

INSTRUCTIONS:
- Analyze ONLY the regulations listed in SCOPE above. Do NOT analyze any other regulations.
- For VIOLATIONS: quote the exact problematic clause and explain what the regulation requires instead.
- For MISSING clauses: identify what is absent, which specific provision of the regulation requires it, and why its absence creates risk.
- For OVERSTATED clauses: quote the exact clause, explain what the regulation actually permits, and explain why the document overclaims.
- Identify the precise location for each finding (clause number, section heading, paragraph number). For MISSING clauses, state where such a clause would typically appear.
- Score = compliance level (100 = fully compliant, 0 = completely non-compliant).
- risk_score = overall risk to the entity (100 = maximum risk).
- Use EXACTLY the regulation key names shown in regulation_scores below (with underscores).

Return ONLY valid JSON — no markdown, no explanation:
{
  "overall_risk": "HIGH" | "MEDIUM" | "LOW",
  "risk_score": 0-100,
  "risk_title": "one-line verdict",
  "summary": "2-3 sentence summary of what was analysed, what is compliant, what is missing, and what is overstated",
  "regulation_scores": {
${regScoresTemplate}
  },
  "stats": { "critical": 0, "high": 0, "medium": 0, "info": 0, "violations": 0, "missing": 0, "overstated": 0 },
  "findings": [
    {
      "id": "F001",
      "finding_type": "VIOLATION" | "MISSING" | "OVERSTATED",
      "severity": "CRITICAL" | "HIGH" | "MEDIUM" | "INFO",
      "title": "concise issue title",
      "regulation": "FEMA 1999",
      "section": "FEMA Section 6(3)(b)",
      "clause_location": "exact location in document, or 'Not present in document' for MISSING findings",
      "problematic_text": "exact verbatim quote for VIOLATION/OVERSTATED; for MISSING write 'Clause absent — not present in document'",
      "description": "3-5 sentence explanation: for VIOLATION — what the document says vs what the regulation requires; for MISSING — what is absent and why it is mandatory; for OVERSTATED — what the document claims vs what the regulation actually permits",
      "suggestion": "2-3 sentence corrective action — what specifically needs to change, be added, or be corrected",
      "clause_example": "complete ready-to-use replacement or addition clause, 3-6 sentences, copy-paste ready"
    }
  ],
  "action_items": [
    { "text": "action description", "priority": "IMMEDIATE" | "SOON" | "STANDARD" }
  ]
}

Generate findings for all three types (VIOLATION, MISSING, OVERSTATED) across ALL regulations listed in SCOPE. Each regulation must be checked independently for all three dimensions. Count all findings correctly in stats.violations, stats.missing, stats.overstated. If no issues exist for a regulation, return empty findings for it. score = compliance (100=fully compliant). risk_score = risk level (100=max risk).`;

  // Load Groq API key from localStorage
  const groqKey = localStorage.getItem("groq_api_key") || "";
  if (!groqKey) throw new Error("No API key set. Go to Settings and paste your free Groq API key.");

  const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${groqKey}`
    },
    body: JSON.stringify({
      model: "llama-3.3-70b-versatile",
      max_tokens: 8000,
      temperature: 0.1,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!resp.ok) {
    const e = await resp.json().catch(() => ({}));
    throw new Error(e.error?.message || `API ${resp.status}`);
  }

  const data = await resp.json();
  const raw = (data.choices || []).map(c => c.message?.content || "").join("");
  const clean = raw.replace(/^```[a-z]*\n?/i, "").replace(/```$/, "").trim();

  let parsed;
  try { parsed = JSON.parse(clean); }
  catch {
    const m = clean.match(/\{[\s\S]*\}/);
    if (m) parsed = JSON.parse(m[0]);
    else throw new Error("AI returned invalid JSON. Please retry.");
  }

  if (!Array.isArray(parsed.findings)) throw new Error("Unexpected response structure. Please retry.");

  // ── Defensive scope enforcement: remove any findings/scores the AI returned
  //    for regulations that weren't in the selected scope ──────────────────────
  const scopeKeys = new Set(scopes.map(toRegKey));        // e.g. {"FEMA","RBI"}
  const scopeNames = new Set(scopes);                     // e.g. {"FEMA","RBI"}

  // Filter findings to only those whose regulation matches a selected scope
  // (AI may return regulation in display form like "FEMA 1999" — match by starts-with)
  parsed.findings = parsed.findings.filter(f => {
    if (!f.regulation) return false;
    const r = f.regulation.trim();
    return [...scopeKeys].some(k => r.startsWith(k.replace(/_/g, " "))) ||
           [...scopeNames].some(n => r.startsWith(n));
  });

  // Remove regulation_scores entries not in scope
  if (parsed.regulation_scores) {
    for (const key of Object.keys(parsed.regulation_scores)) {
      if (!scopeKeys.has(key) && !scopeKeys.has(key.replace(/ /g, "_"))) {
        delete parsed.regulation_scores[key];
      }
    }
  }

  return parsed;
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────

function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [authLoading, setAuthLoading] = useState(true);

  useEffect(() => { injectStyles(); }, []);
  useEffect(() => {
    if (!initFirebase()) { setAuthLoading(false); return; }
    const unsub = firebaseAuth.onAuthStateChanged(async (u) => {
      if (u) {
        const em = (u.email || "").toLowerCase();
        const nm = u.displayName || (em ? em.split("@")[0] : "User");
        await ensureOwner(em);
        await upsertUserRecord({ uid: u.uid, name: nm, email: em }, false);
        const isOwner = em === (FIXED_OWNER_EMAIL || "").toLowerCase();
        setUser({ name: nm, email: em, avatar: (nm[0] || "U").toUpperCase(), role: isOwner ? "Owner" : "User" });
        setPage("dashboard");
      } else {
        setUser(null);
      }
      setAuthLoading(false);
    });
    return () => unsub && unsub();
  }, []);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [scanHistory, setScanHistory] = useState([]);
  const { toasts, add: toast } = useToast();

  const handleScanComplete = useCallback(result => {
    const entry = {
      id: "SCN-" + String(Math.floor(Math.random() * 900) + 100),
      date: new Date().toISOString().split("T")[0],
      time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),
      user: result.user || user?.name,
      avatar: result.avatar || user?.avatar,
      docName: result.docName || "Agreement_" + Date.now(),
      risk: result.overall_risk,
      score: result.risk_score,
      findings: result.findings?.length || 0,
      critical: result.stats?.critical || 0,
      status: "Pending",
      summary: result.summary,
    };
    setScanHistory(h => [entry, ...h]);
  }, [user]);

  if (authLoading) return (
    <div className="ls-root" style={{ display:"flex", alignItems:"center", justifyContent:"center", minHeight:"100vh" }}>
      <div style={{ color:"#64748b", fontSize:18 }}>Loading…</div>
    </div>
  );

  if (!user) return (
    <div className="ls-root">
      <LoginPage onLogin={u => { setUser(u); setPage("dashboard"); }} />
      <ToastStack toasts={toasts} />
    </div>
  );

  const doLogout = async () => { try { if (initFirebase()) await firebaseAuth.signOut(); } catch {} setUser(null); };
  return (
    <div className="ls-root" style={{ display: "flex" }}>
      <div className="gc-sidebar" style={{ display: "flex" }}>
        <Sidebar
          active={page}
          onNav={setPage}
          user={user}
          onLogout={doLogout}
          collapsed={sidebarCollapsed}
          onToggle={() => setSidebarCollapsed(v => !v)}
        />
      </div>
      <div className="gc-main-area" style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: "100vh", overflow: "hidden" }}>
        <Topbar page={page} user={user} />
        <div className="ls-scroll" style={{ flex: 1, overflowY: "auto" }}>
          {page === "dashboard" && <DashboardPage onNav={setPage} user={user} scanHistory={scanHistory} />}
          {page === "scan"      && <ScanPage toast={toast} user={user} onScanComplete={handleScanComplete} />}
          {page === "history"   && <HistoryPage history={scanHistory} toast={toast} />}
          {page === "settings"  && <SettingsPage user={user} toast={toast} />}
          {page === "profile"   && <SettingsPage user={user} toast={toast} />}
        </div>
      </div>
      <BottomNav active={page} onNav={setPage} onLogout={doLogout} />
      <ToastStack toasts={toasts} />
    </div>
  );
}


    // Mount
    const rootEl = document.getElementById("root");
    // React 18 createRoot is present on ReactDOM in the UMD build.
    const root = ReactDOM.createRoot ? ReactDOM.createRoot(rootEl) : null;
    if (root) {
      root.render(<App />);
    } else {
      ReactDOM.render(<App />, rootEl);
    }
  </script>
</body>
